name: homewatt

x-app-environment: &app-environment
    APP_ENV: production
    APP_DEBUG: "false"
    DB_HOST: db
    DB_PORT: 3306
    CACHE_STORE: redis
    QUEUE_CONNECTION: database
    REDIS_HOST: redis
    REDIS_PORT: 6379
    APP_RELEASE: ${APP_RELEASE:-unknown}

x-app-service: &app-service
    image: homewatt-app:${APP_IMAGE_TAG:-latest}
    pull_policy: never
    environment:
        <<: *app-environment
    volumes:
        - ./.env:/var/www/.env:ro
        - storage_data:/var/www/storage
    networks:
        - homewatt-network
    restart: unless-stopped

services:
    app:
        <<: *app-service
        build:
            context: .
            dockerfile: Dockerfile
            target: production
            args:
                APP_RELEASE: ${APP_RELEASE:-unknown}
        container_name: homewatt-app
        environment:
            <<: *app-environment
            CONTAINER_ROLE: app
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "/usr/local/bin/container-healthcheck"]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s
        stop_grace_period: 30s

    queue:
        <<: *app-service
        container_name: homewatt-queue
        command: php artisan queue:work --queue=default --sleep=2 --tries=3 --timeout=90
        environment:
            <<: *app-environment
            CONTAINER_ROLE: queue
        depends_on:
            app:
                condition: service_healthy
        init: true
        healthcheck:
            test: ["CMD", "/usr/local/bin/container-healthcheck"]
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 20s
        stop_grace_period: 120s

    queue-ai:
        <<: *app-service
        container_name: homewatt-queue-ai
        command: php artisan queue:work --queue=ai --sleep=5 --tries=3 --timeout=180
        environment:
            <<: *app-environment
            CONTAINER_ROLE: queue-ai
        depends_on:
            app:
                condition: service_healthy
        init: true
        healthcheck:
            test: ["CMD", "/usr/local/bin/container-healthcheck"]
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 20s
        stop_grace_period: 210s

    scheduler:
        <<: *app-service
        container_name: homewatt-scheduler
        command: php artisan schedule:work
        environment:
            <<: *app-environment
            CONTAINER_ROLE: scheduler
        depends_on:
            app:
                condition: service_healthy
        init: true
        healthcheck:
            test: ["CMD", "/usr/local/bin/container-healthcheck"]
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 20s
        stop_grace_period: 30s

    nginx:
        build:
            context: .
            dockerfile: Dockerfile
            target: web
            args:
                APP_RELEASE: ${APP_RELEASE:-unknown}
        image: homewatt-nginx:${APP_IMAGE_TAG:-latest}
        pull_policy: never
        container_name: homewatt-nginx
        ports:
            - "${APP_HTTP_PORT:-8087}:80"
        volumes:
            - storage_data:/var/www/storage:ro
        networks:
            - homewatt-network
        depends_on:
            app:
                condition: service_healthy
        restart: unless-stopped

    db:
        image: mysql:8.0
        container_name: homewatt-db
        command:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
        ports:
            - "${DB_FORWARD_PORT:-3311}:3306"
        environment:
            MYSQL_DATABASE: ${DB_DATABASE:-homewatt}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
            MYSQL_ROOT_HOST: "%"
        volumes:
            - dbdata:/var/lib/mysql
        networks:
            - homewatt-network
        healthcheck:
            test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s
        restart: unless-stopped

    redis:
        image: redis:7-alpine
        container_name: homewatt-redis
        ports:
            - "${REDIS_FORWARD_PORT:-6384}:6379"
        volumes:
            - redisdata:/data
        networks:
            - homewatt-network
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 3s
            retries: 5
        restart: unless-stopped

volumes:
    dbdata:
    redisdata:
    storage_data:

networks:
    homewatt-network:
        driver: bridge
